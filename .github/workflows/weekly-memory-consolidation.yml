# Business value: turn repeated operational lessons into reviewed memory candidates without silently changing company truth.
name: Weekly memory candidates

on:
  schedule:
    - cron: "30 15 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect journal candidates for human review
        run: rg -n -A 2 '^## Memory candidate' packs/marketing-agency/memory/logs > memory-candidates.txt
      - uses: actions/upload-artifact@v4
        with:
          name: memory-candidates
          path: memory-candidates.txt
