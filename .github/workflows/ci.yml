# Business value: prevent unsafe policy, pack, runtime, and deployment changes from entering the shared operating system.
name: Validate operating system

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: make validate
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
