name: Bug
description: Report a reproducible defect without including sensitive records.
title: "[Bug]: "
labels: ["bug", "agent:ready"]
body:
  - type: textarea
    id: observed
    attributes: { label: Observed behavior }
    validations: { required: true }
  - type: textarea
    id: reproduce
    attributes: { label: Safe reproduction steps }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: Commit or workflow version }
